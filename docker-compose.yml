version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: acdt-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: acdt
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: acdt-redis
    ports:
      - '6379:6379'

  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: acdt-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    depends_on:
      - postgres
    ports:
      - '7233:7233'

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: acdt-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    ports:
      - '8080:8080'

volumes:
  postgres_data:
